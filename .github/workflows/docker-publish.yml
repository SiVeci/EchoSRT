name: Build and Publish Docker Images

# 触发条件：手动触发
on:
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    # 赋予 Action 读写 GitHub Packages (GHCR) 的权限
    permissions:
      contents: read
      packages: write

    steps:
      # [新增] 清理无用的预装软件
      - name: Free up disk space
        run: |
          sudo rm -rf /usr/share/dotnet
          sudo rm -rf /opt/ghc
          sudo rm -rf "/usr/local/share/boost"
          sudo rm -rf "$AGENT_TOOLSDIRECTORY"
          sudo apt-get clean

      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to the Container registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }} # GitHub 自动生成的 Token，无需手动配置

      - name: Lowercase image name
        run: |
          echo "IMAGE_NAME_LOWER=$(echo ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }} | tr '[:upper:]' '[:lower:]')" >> $GITHUB_ENV

      # 1. 编译并推送 CPU 镜像
      - name: Build and push CPU image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: |
            ${{ env.IMAGE_NAME_LOWER }}:cpu-latest
            ${{ env.IMAGE_NAME_LOWER }}:cpu-${{ github.event.release.tag_name || 'dev' }}
          # [修改] 添加 scope=cpu，隔离 CPU 环境缓存
          cache-from: type=gha,scope=cpu
          cache-to: type=gha,mode=max,scope=cpu

      # 2. 编译并推送 GPU 镜像
      - name: Build and push GPU image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile.gpu
          push: true
          tags: |
            ${{ env.IMAGE_NAME_LOWER }}:gpu-latest
            ${{ env.IMAGE_NAME_LOWER }}:gpu-${{ github.event.release.tag_name || 'dev' }}
          # [修改] 添加 scope=gpu，隔离 GPU 环境缓存
          cache-from: type=gha,scope=gpu
          cache-to: type=gha,mode=max,scope=gpu