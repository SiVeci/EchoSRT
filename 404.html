<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <title>EchoSRT 文档已迁移...</title>
  <style>
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
      text-align: center;
      padding: 50px;
      color: #333;
      background-color: #f6f8fa;
    }
    .spinner {
      margin-top: 20px;
      font-size: 1.2em;
      color: #0366d6;
    }
  </style>
  <script>
    // 1. 获取用户当前请求的旧路径 (例如: /EchoSRT/docs/intro)
    var currentPath = window.location.pathname.toLowerCase();

    // 2. 你的新 GitHub Wiki 基础地址
    var targetBase = "https://github.com/SiVeci/EchoSRT/wiki";

    // 3. 路由映射表 (旧路径的关键词 -> 新 Wiki 对应的页面名)
    // 注意：右侧的新页面名称需和 GitHub Wiki 上的文件名保持一致（区分大小写）
    var routeMap = {
      "intro": "/Home",                // 如果旧链接包含 intro，跳到 Wiki 首页
      "deploy": "/Deploy-Guide",       // 替换为你的实际部署页名称
      "config": "/Configuration",      // 替换为你的实际配置页名称
      // 可以继续添加其他映射...
    };

    var finalUrl = targetBase; // 默认保底跳转到 Wiki 首页

    // 4. 遍历映射表，寻找模糊匹配
    for (var key in routeMap) {
      if (currentPath.includes(key)) {
        finalUrl = targetBase + routeMap[key];
        break;
      }
    }

    // 5. 执行客户端重定向 (replace 不会在浏览器历史中留下 404 页面的记录)
    window.location.replace(finalUrl);
  </script>
</head>
<body>
  <h2>🚀 EchoSRT 文档已全面升级</h2>
  <div class="spinner">正在为您跳转到最新 Wiki...</div>
  <p style="margin-top: 30px; font-size: 0.9em; color: #666;">
    如果没有自动跳转，请 <a href="https://github.com/SiVeci/EchoSRT/wiki" style="color: #0366d6;">点击这里</a>。
  </p>
</body>
</html>
