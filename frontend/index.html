<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AutoSRT WebUI</title>
  
  <!-- 引入 Element Plus 的 CSS -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/element-plus/dist/index.css" />
  <link rel="stylesheet" href="./css/style.css" />
  <style>
    .header {
      background-color: #409EFF;
      color: white;
      text-align: center;
      line-height: 60px;
      font-size: 24px;
      font-weight: bold;
      box-shadow: 0 2px 12px 0 rgba(0,0,0,0.1);
    }
    .main-container {
      max-width: 1600px;
      min-width: 1200px;
      margin: 20px auto;
      padding: 0 20px;
    }
    .box-card {
      border-radius: 8px;
    }
    .global-action-bar {
      margin-bottom: 20px;
      background: white;
      padding: 15px 20px;
      border-radius: 8px;
      box-shadow: 0 2px 12px 0 rgba(0,0,0,0.1);
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    /* 隐藏 Element Plus Tabs 的内容区边距，由组件内部自行控制 */
    .el-tabs__content {
      padding: 20px 0;
    }
  </style>
</head>
<body>
  <div id="app">
    <el-container>
      <el-header class="header">🎬 AutoSRT 智能字幕工作台</el-header>
      <el-main class="main-container">
        
        <el-row :gutter="20">
          <!-- 左侧主工作区 (16/24 约 67%) -->
          <el-col :span="16">
            
            <!-- 全局操作条 (Global Action Bar) -->
            <div class="global-action-bar">
              <div style="color: #606266; font-size: 14px;">
                当前处理任务: 
                <el-tag :type="store.taskId ? 'success' : 'info'" effect="dark">
                  {{ store.taskId ? store.taskId.split('-')[0] + '...' : '未创建或未选择' }}
                </el-tag>
              </div>
              <div style="display: flex; gap: 15px;">
                <el-button type="success" size="large" @click="runPipeline(false)" plain>
                  🎯 执行提取工作流 (仅原声字幕)
                </el-button>
                <el-button type="primary" size="large" @click="runPipeline(true)">
                  🚀 执行全量工作流 (含智能翻译)
                </el-button>
              </div>
            </div>

            <!-- 核心卡片及 Tab 切页 -->
            <el-card class="box-card" shadow="never">
              <el-tabs v-model="activeTab" class="main-tabs" stretch>
                <el-tab-pane label="📁 任务工作区" name="workspace">
                  <tab-workspace></tab-workspace>
                </el-tab-pane>
                <el-tab-pane label="🎵 提取音频" name="audio">
                  <tab-audio></tab-audio>
                </el-tab-pane>
                <el-tab-pane label="🗣️ 原声识别" name="whisper">
                  <tab-whisper></tab-whisper>
                </el-tab-pane>
                <el-tab-pane label="🌐 LLM 翻译" name="llm">
                  <tab-llm></tab-llm>
                </el-tab-pane>
              </el-tabs>
            </el-card>

          </el-col>

          <!-- 右侧常驻控制台 (8/24 约 33%) -->
          <el-col :span="8">
            <global-console></global-console>
          </el-col>
        </el-row>

      </el-main>
    </el-container>
  </div>

  <!-- 引入 Vue 3 -->
  <script src="https://cdn.jsdelivr.net/npm/vue@3/dist/vue.global.js"></script>
  <!-- 引入 Element Plus -->
  <script src="https://cdn.jsdelivr.net/npm/element-plus"></script>
  <!-- 引入 Element Plus 图标 -->
  <script src="https://cdn.jsdelivr.net/npm/@element-plus/icons-vue"></script>

  <!-- 以 ES Module 形式加载主入口 -->
  <script type="module" src="./js/main.js"></script>
</body>
</html>
