<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AutoSRT API 测试页</title>
    <style>
        body { font-family: sans-serif; padding: 20px; max-width: 800px; margin: 0 auto; }
        .card { border: 1px solid #ccc; padding: 15px; margin-bottom: 20px; border-radius: 5px; }
        button { padding: 8px 15px; margin-right: 10px; cursor: pointer; }
        button:disabled { cursor: not-allowed; opacity: 0.6; }
        #logBox { width: 100%; height: 300px; padding: 10px; background: #1e1e1e; color: #00ff00; font-family: monospace; overflow-y: auto; box-sizing: border-box; margin-top: 10px;}
        .status-success { color: green; font-weight: bold; }
        .status-error { color: red; font-weight: bold; }
    </style>
</head>
<body>
    <h1>AutoSRT - API 测试页面</h1>
    
    <div class="card">
        <h3>1. 选择并上传视频</h3>
        <input type="file" id="videoFile" accept="video/*" />
        <button id="uploadBtn" onclick="uploadVideo()">上传视频</button>
        <span id="uploadStatus"></span>
    </div>

    <div class="card">
        <h3>2. 开始转录</h3>
        <button id="transcribeBtn" onclick="startTranscribe()" disabled>启动语音识别</button>
        <span id="transcribeStatus">需先上传视频</span>
    </div>

    <div class="card">
        <h3>3. 实时进度与日志</h3>
        <div id="logBox"></div>
    </div>

    <div class="card">
        <h3>4. 下载字幕</h3>
        <button id="downloadBtn" onclick="downloadSrt()" disabled>下载 .srt 字幕文件</button>
    </div>

    <script>
        const API_BASE = "http://127.0.0.1:8000";
        const WS_BASE = "ws://127.0.0.1:8000";
        
        let currentTaskId = null;
        let ws = null;
        let configPayload = {};

        // 页面加载时先获取默认配置
        window.onload = async () => {
            logMsg("正在获取默认配置...", "system");
            try {
                const res = await fetch(`${API_BASE}/api/config`);
                configPayload = await res.json();
                logMsg("配置获取成功！", "system");
            } catch (err) {
                logMsg("获取配置失败: " + err, "error");
            }
        };

        // 向日志框追加内容
        function logMsg(msg, type="info") {
            const logBox = document.getElementById("logBox");
            const colorMap = { "info": "#fff", "system": "#0ff", "error": "#f44", "progress": "#0f0" };
            const time = new Date().toLocaleTimeString();
            const span = document.createElement("div");
            span.style.color = colorMap[type] || "#fff";
            span.textContent = `[${time}] ${msg}`;
            logBox.appendChild(span);
            logBox.scrollTop = logBox.scrollHeight;
        }

        // 上传视频
        async function uploadVideo() {
            const fileInput = document.getElementById("videoFile");
            if (!fileInput.files.length) {
                alert("请先选择一个视频文件！");
                return;
            }

            const file = fileInput.files[0];
            const formData = new FormData();
            formData.append("file", file);

            document.getElementById("uploadBtn").disabled = true;
            document.getElementById("uploadStatus").textContent = "正在上传中，请稍候...";
            logMsg(`开始上传文件: ${file.name} ...`, "system");

            try {
                const response = await fetch(`${API_BASE}/api/upload`, {
                    method: "POST",
                    body: formData
                });
                const data = await response.json();
                
                if (response.ok) {
                    currentTaskId = data.task_id;
                    document.getElementById("uploadStatus").innerHTML = `<span class="status-success">上传成功! Task ID: ${currentTaskId}</span>`;
                    logMsg(`上传成功，分配到的 Task ID: ${currentTaskId}`, "info");
                    
                    // 解锁转录按钮
                    document.getElementById("transcribeBtn").disabled = false;
                    document.getElementById("transcribeStatus").textContent = "准备就绪";
                } else {
                    throw new Error(data.detail || "上传失败");
                }
            } catch (error) {
                document.getElementById("uploadStatus").innerHTML = `<span class="status-error">${error.message}</span>`;
                logMsg(`上传异常: ${error.message}`, "error");
            } finally {
                document.getElementById("uploadBtn").disabled = false;
            }
        }

        // 启动转录并连接 WebSocket
        async function startTranscribe() {
            if (!currentTaskId) return;
            
            document.getElementById("transcribeBtn").disabled = true;
            document.getElementById("transcribeStatus").textContent = "任务已提交...";
            logMsg("正在请求后端启动转录任务...", "system");

            // 建立 WebSocket 连接
            ws = new WebSocket(`${WS_BASE}/ws/progress/${currentTaskId}`);
            ws.onopen = () => logMsg("WebSocket 已连接，等待进度推送...", "system");
            
            ws.onerror = (err) => {
                logMsg("WebSocket 连接发生错误，可能后端缺少 websockets 库。", "error");
                document.getElementById("transcribeStatus").innerHTML = `<span class="status-error">连接失败</span>`;
            };
            
            ws.onclose = (event) => {
                logMsg(`WebSocket 连接已关闭 (代码: ${event.code})`, "system");
            };

            ws.onmessage = (event) => {
                const data = JSON.parse(event.data);
                if (data.status === "processing" && data.progress) {
                    logMsg(`[${data.progress}] ${data.text}`, "progress");
                } else {
                    logMsg(`[后端状态] ${data.step || ''}: ${data.message || data.text || ''}`, "info");
                }

                if (data.status === "completed") {
                    document.getElementById("transcribeStatus").innerHTML = `<span class="status-success">转录完成！</span>`;
                    document.getElementById("downloadBtn").disabled = false;
                    ws.close();
                }
                if (data.status === "error") {
                    document.getElementById("transcribeStatus").innerHTML = `<span class="status-error">发生错误</span>`;
                    ws.close();
                }
            };

            // 发送配置和任务 ID 给后端
            configPayload.task_id = currentTaskId;
            fetch(`${API_BASE}/api/transcribe`, {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify(configPayload)
            });
        }

        // 下载字幕文件
        function downloadSrt() {
            if (currentTaskId) {
                window.open(`${API_BASE}/api/download/${currentTaskId}`, "_blank");
            }
        }
    </script>
</body>
</html>
